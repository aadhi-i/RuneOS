<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e12" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>
    <linearGradient id="moon-grad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#cba6f7"/>
      <stop offset="70%" stop-color="#7c5cbf"/>
      <stop offset="100%" stop-color="#2a1b4d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <mask id="crescent-mask">
      <rect width="3840" height="2160" fill="white" />
      <circle cx="2800" cy="980" r="580" fill="black" />
    </mask>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <g transform="translate(350, 1100)">
    <text font-family="sans-serif" font-size="240" font-weight="800" fill="#ffffff" letter-spacing="-4">Rune <tspan fill="#cba6f7">OS</tspan></text>
    <text y="90" font-family="monospace" font-size="35" fill="#7c5cbf" font-weight="bold" letter-spacing="12" opacity="0.8">VERSION 1.0 IRON</text>
  </g>
  <g filter="url(#glow)">
    <circle cx="3000" cy="1080" r="600" fill="url(#moon-grad)" mask="url(#crescent-mask)" />
  </g>
</svg>
