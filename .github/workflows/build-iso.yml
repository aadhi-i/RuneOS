name: Build Rune OS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
        
      - name: Build ISO in Native ARM64 Container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/ubuntu:24.04 \
            bash -c "
              export DEBIAN_FRONTEND=noninteractive &&
              apt-get update && 
              apt-get install -y live-build debootstrap squashfs-tools xorriso mtools grub-efi-arm64-bin dpkg-dev && 
              lb clean --purge &&
              lb build
            "
        
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rune-OS-1.0-Iron-arm64
          path: "*.iso"
          if-no-files-found: error
