name: Build Rune OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            qemu-user-static \
            binfmt-support \
            debootstrap
          sudo update-binfmts --enable qemu-aarch64

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: rune-os-cache-${{ hashFiles('config/package-lists/**') }}
          restore-keys: rune-os-cache-

      - name: Configure live-build for ARM64
        run: |
          lb config \
            --architecture arm64 \
            --distribution noble \
            --archive-areas "main universe restricted multiverse" \
            --debian-installer none \
            --bootappend-live "boot=live components quiet splash" \
            --mirror-bootstrap http://ports.ubuntu.com/ubuntu-ports/ \
            --mirror-chroot http://ports.ubuntu.com/ubuntu-ports/ \
            --mirror-binary http://ports.ubuntu.com/ubuntu-ports/ \
            --bootstrap-qemu-arch arm64 \
            --bootstrap-qemu-static /usr/bin/qemu-aarch64-static \
            --apt-options "--yes -o Acquire::Retries=3"

      - name: Build Rune OS ISO
        run: |
          sudo lb build 2>&1 | tee build.log

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cache
          key: rune-os-cache-${{ hashFiles('config/package-lists/**') }}

      - name: Find and rename ISO
        run: |
          echo "==> Listing all files in current directory:"
          sudo ls -lh
          echo "==> Searching for any ISO file:"
          sudo find . -maxdepth 3 -name "*.iso" -type f 2>/dev/null
          echo "==> Renaming ISO:"
          ISO=$(sudo find . -maxdepth 3 -name "*.iso" -type f 2>/dev/null | head -1)
          if [ -n "$ISO" ]; then
            sudo mv "$ISO" rune-os-1.0-arm64.iso
            echo "✓ ISO renamed: $ISO → rune-os-1.0-arm64.iso"
            ls -lh rune-os-1.0-arm64.iso
          else
            echo "No ISO found — build may have failed"
            cat build.log | tail -50
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: rune-os-1.0-arm64
          path: "rune-os-1.0-arm64.iso"
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
