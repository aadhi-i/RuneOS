name: Build Rune OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker system prune -af 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            qemu-user-static \
            binfmt-support \
            debootstrap
          sudo update-binfmts --enable qemu-aarch64
          echo "✓ Dependencies installed"

      - name: Restore package cache
        uses: actions/cache@v4
        with:
          path: cache
          key: rune-os-noble-arm64-${{ hashFiles('config/package-lists/**') }}
          restore-keys: |
            rune-os-noble-arm64-

      - name: Configure live-build
        run: |
          lb config \
            --architecture arm64 \
            --distribution noble \
            --archive-areas "main universe restricted multiverse" \
            --debian-installer none \
            --bootappend-live "boot=live components quiet splash" \
            --mirror-bootstrap http://ports.ubuntu.com/ubuntu-ports/ \
            --mirror-chroot http://ports.ubuntu.com/ubuntu-ports/ \
            --mirror-binary http://ports.ubuntu.com/ubuntu-ports/ \
            --bootstrap-qemu-arch arm64 \
            --bootstrap-qemu-static /usr/bin/qemu-aarch64-static \
            --apt-options "--yes -o Acquire::Retries=3 -o Acquire::http::Timeout=60"
          echo "✓ live-build configured"

      - name: Build ISO
        run: |
          sudo lb build 2>&1 | tee build.log
          echo "==> Build exit code: $?"

      - name: Save package cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cache
          key: rune-os-noble-arm64-${{ hashFiles('config/package-lists/**') }}

      - name: Locate and rename ISO
        run: |
          echo "==> All files in build dir:"
          sudo ls -lh *.iso 2>/dev/null || echo "No ISO in root"
          echo "==> Checking known live-build output names:"
          for name in \
            "live-image-arm64.hybrid.iso" \
            "binary.hybrid.iso" \
            "live-image-arm64.iso" \
            "binary.iso"; do
            if sudo test -f "$name"; then
              echo "✓ Found: $name"
              sudo mv "$name" rune-os-1.0-arm64.iso
              echo "✓ Renamed to rune-os-1.0-arm64.iso"
              sudo ls -lh rune-os-1.0-arm64.iso
              exit 0
            fi
          done
          echo "==> None of the known names found. Deep search:"
          sudo find /home/runner/work -maxdepth 4 -name "*.iso" 2>/dev/null
          sudo find . -maxdepth 3 -name "*.iso" 2>/dev/null
          echo "==> Last 30 lines of build log:"
          tail -30 build.log
          exit 1

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: rune-os-1.0-arm64
          path: rune-os-1.0-arm64.iso
          retention-days: 14
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
