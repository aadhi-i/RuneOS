name: Build Rune OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install live-build
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y live-build

      - name: Build Rune OS ISO
        run: |
          sudo lb build 2>&1 | tee build.log

      - name: Check output
        run: |
          ls -lh *.iso 2>/dev/null || echo "No ISO found"
          df -h

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: rune-os-1.0-arm64
          path: "*.iso"
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
