name: Build Rune OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            qemu-user-static \
            binfmt-support \
            debootstrap
          sudo update-binfmts --enable qemu-aarch64

      - name: Configure live-build for ARM64
        run: |
          lb config \
            --architecture arm64 \
            --distribution noble \
            --archive-areas "main universe restricted multiverse" \
            --debian-installer none \
            --bootappend-live "boot=live components quiet splash" \
            --mirror-bootstrap http://ports.ubuntu.com/ubuntu-ports/ \
            --mirror-chroot http://ports.ubuntu.com/ubuntu-ports/ \
            --mirror-binary http://ports.ubuntu.com/ubuntu-ports/ \
            --bootstrap-qemu-arch arm64 \
            --bootstrap-qemu-static /usr/bin/qemu-aarch64-static \
            --updates false \
            --security false \
            --apt-options "--yes -o Acquire::Retries=3"

      - name: Build Rune OS ISO
        run: |
          sudo lb build 2>&1 | tee build.log

      - name: Find and rename ISO
        run: |
          find . -name "*.iso" -type f
          mv binary.hybrid.iso rune-os-1.0-arm64.iso 2>/dev/null || \
          find . -name "*.iso" -exec mv {} rune-os-1.0-arm64.iso \; 2>/dev/null || \
          echo "No ISO found"
          ls -lh *.iso 2>/dev/null
          df -h

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: rune-os-1.0-arm64
          path: "rune-os-1.0-arm64.iso"
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
